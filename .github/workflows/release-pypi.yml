name: Release Testkit Package

run-name: >-
  Testkit release
  (${{ inputs.target_repository }}
  ${{ inputs.release_type }}
  ${{ inputs.release_type == 'custom' && inputs.custom_version || inputs.preid }})

on:
  workflow_dispatch:
    inputs:
      target_repository:
        description: Publish target
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
      release_type:
        description: Semantic version action
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
          - release
          - custom
      preid:
        description: Prerelease channel for pre* and prerelease actions
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - rc
      custom_version:
        description: Explicit semantic version when release_type is custom
        required: false
        type: string

concurrency:
  group: testkit-release-${{ github.event.repository.full_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      stable: ${{ steps.version.outputs.stable }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Require default branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ]]; then
            echo "Releases must be triggered from ${{ github.event.repository.default_branch }}." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: python -m pip install --upgrade pdm

      - name: Sync dev environment
        run: pdm sync -d

      - name: Run test suite
        run: pdm run pytest -q

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.release_type }}" == "custom" ]]; then
            if [[ -z "${{ inputs.custom_version }}" ]]; then
              echo "custom_version is required when release_type=custom" >&2
              exit 1
            fi
            VERSION=$(python scripts/release.py --set-version "${{ inputs.custom_version }}")
          else
            VERSION=$(python scripts/release.py --bump "${{ inputs.release_type }}" --preid "${{ inputs.preid }}")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: $VERSION"

      - name: Fail if release tag already exists
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin." >&2
            exit 1
          fi

      - name: Build package
        run: pdm build

      - name: Validate package metadata
        run: pdm run twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testkit-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    if: ${{ inputs.target_repository == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/piphi-runtime-testkit-python/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: testkit-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    if: ${{ inputs.target_repository == 'pypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/piphi-runtime-testkit-python/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: testkit-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  finalize-pypi:
    if: ${{ inputs.target_repository == 'pypi' }}
    needs:
      - build
      - publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Commit release metadata locally
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release.py --set-version "${{ needs.build.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "release: v${{ needs.build.outputs.version }}"
          git tag "v${{ needs.build.outputs.version }}"

      - name: Push release commit and tag
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "v${{ needs.build.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          if [[ "${{ needs.build.outputs.stable }}" == "true" ]]; then
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
          else
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes --prerelease
          fi
