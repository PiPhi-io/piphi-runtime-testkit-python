name: Testkit Package Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PDM
        run: python -m pip install --upgrade pdm

      - name: Sync dev environment
        run: pdm sync -d

      - name: Run test suite
        run: pdm run pytest -q

  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: python -m pip install --upgrade pdm

      - name: Sync dev environment
        run: pdm sync -d

      - name: Build package
        run: pdm build

      - name: Validate package metadata
        run: pdm run twine check dist/*
